<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zikirmatik Pro v21</title>
    <style>
        :root { --bg: #050505; --card: #1c1c1e; --accent: #d4af37; --neon: #00f2ff; --gold: #ffca28; }
        body.theme-huzur { --neon: #00ff88; --accent: #88ff00; }
        body.theme-gul { --neon: #ff0055; --accent: #ffaa00; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; touch-action: manipulation; }
        
        body { 
            margin: 0; padding: 10px; background: var(--bg); color: #fff; 
            height: 100vh; display: flex; flex-direction: column; 
            overflow: hidden; transition: 0.3s;
            padding-bottom: env(safe-area-inset-bottom); /* iPhone Alt Boşluk */
        }
        
        /* ÜST BAR BÜYÜK */
        .top-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; background: rgba(255,255,255,0.05); 
            border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(0,242,255,0.3);
            margin-top: env(safe-area-inset-top); /* iPhone Çentik Boşluğu */
        }
        .time-info { font-size: 1.3rem; color: var(--neon); font-family: monospace; font-weight: 900; }
        .theme-switch { background: var(--neon); border: none; color: #000; padding: 10px 15px; border-radius: 10px; font-weight: bold; }

        .info-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .info-panel { 
            flex: 1; background: #111; border-radius: 15px; padding: 12px; 
            border: 1px solid #333; text-align: center; min-height: 110px; 
            display: flex; flex-direction: column; justify-content: center; 
        }
        .info-panel b { font-size: 0.8rem; color: var(--gold); display: block; margin-bottom: 5px; }
        .info-panel span { font-size: 0.95rem; color: #eee; font-style: italic; line-height: 1.3; }

        .esma-box { 
            background: var(--card); border-radius: 25px; padding: 20px; 
            text-align: center; border: 1px solid rgba(212,175,55,0.4); 
            margin-bottom: 10px; position: relative; height: 260px; 
            display: flex; flex-direction: column; justify-content: center; 
        }
        .arabic { color: var(--accent); font-size: 3.2rem; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 10px rgba(212,175,55,0.3); }
        .tr-name { font-size: 1.6rem; font-weight: 900; color: #fff; letter-spacing: 1px; }
        .meaning { font-size: 1rem; color: #bbb; margin-top: 10px; line-height: 1.4; padding: 0 10px; }
        
        .zikir-main { background: #121214; border-radius: 30px; padding: 15px; flex: 1; display: flex; flex-direction: column; gap: 12px; }
        .z-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; -webkit-overflow-scrolling: touch; }
        .chip { flex: 0 0 auto; padding: 12px 20px; background: #2c2c2e; border-radius: 12px; color: #aaa; font-size: 1rem; font-weight: 600; }
        .chip.active { background: rgba(0,242,255,0.15); border: 2px solid var(--neon); color: var(--neon); }
        
        .tap-zone { 
            flex: 1; border: 2px solid #222; border-radius: 25px; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; cursor: pointer; background: rgba(255,255,255,0.02);
        }
        .count-display { font-size: 8.5rem; font-family: monospace; color: var(--neon); font-weight: 900; line-height: 1; }
        
        /* BUTONLAR YUKARI ÇEKİLDİ */
        .btn-row { display: flex; gap: 12px; margin-bottom: 5px; }
        .btn { 
            flex: 1; padding: 22px; border-radius: 18px; border: none; 
            font-weight: 900; font-size: 1.4rem; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        #logPanel { position: fixed; bottom: 0; left: 0; right: 0; height: 85%; background: #000; border-top: 4px solid var(--neon); z-index: 2000; padding: 25px; display: none; flex-direction: column; border-radius: 30px 30px 0 0; }
    </style>
</head>
<body onclick="initAudio()">

    <div class="top-bar">
        <div class="time-info">
            <div id="sessionTimer">00:00</div>
            <div id="clock">00:00:00</div>
        </div>
        <button class="theme-switch" onclick="nextTheme()">TEMA</button>
    </div>

    <div class="info-row">
        <div class="info-panel"><b>📖 AYET</b><span id="ayetTxt">Kalpler ancak Allah'ı anmakla huzur bulur.</span></div>
        <div class="info-panel"><b>✨ HADİS</b><span id="hadisTxt">Zikir kalbin cilasıdır.</span></div>
    </div>

    <div class="esma-box">
        <button onclick="move(-1)" style="position:absolute; left:0; height:100%; width:60px; background:none; border:none; color:white; font-size:3.5rem; opacity:0.3; z-index:10;">‹</button>
        <div id="ar" class="arabic">الله</div>
        <div id="tr" class="tr-name">ALLAH (C.C)</div>
        <div id="mn" class="meaning">Varlığı zorunlu olan tek ilah.</div>
        <button onclick="move(1)" style="position:absolute; right:0; height:100%; width:60px; background:none; border:none; color:white; font-size:3.5rem; opacity:0.3; z-index:10;">›</button>
    </div>

    <div class="zikir-main">
        <div class="z-scroll">
            <div class="chip active" onclick="changeCategory('Esma', this)">99 Esma</div>
            <div class="chip" onclick="changeCategory('Salavat', this)">20 Salavat</div>
            <div class="chip" onclick="changeCategory('Tevhid', this)">Kelime-i Tevhid</div>
        </div>
        
        <div class="tap-zone" onclick="hit(event)">
            <span id="activeLbl" style="color:var(--neon); font-size:1.3rem; font-weight:bold; text-transform:uppercase;">ALLAH</span>
            <div class="count-display" id="count">0</div>
        </div>

        <div class="btn-row">
            <button class="btn" style="background:var(--accent); color:#000;" onclick="save()">KAYDET</button>
            <button class="btn" style="background:#333; color:#fff;" onclick="toggle()">DEFTER</button>
        </div>
    </div>

    <div id="logPanel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0; color:var(--neon); font-size:1.8rem;">Zikir Defteri</h2>
            <button onclick="toggle()" style="background:#222; color:#fff; border:none; padding:15px 30px; border-radius:15px; font-weight:bold;">KAPAT</button>
        </div>
        <div id="logList" style="flex:1; overflow-y:auto; padding-bottom:40px;"></div>
    </div>

<script>
    // --- VERİLER ---
    const ESMA = [
        {a:"الله", t:"ALLAH", m:"Bütün isim ve sıfatları kendinde toplayan yüce yaratıcı."},
        {a:"الرَّحْمَنُ", t:"ER-RAHMÂN", m:"Dünyada bütün mahlukata rızık veren, merhamet eden."},
        {a:"الرَّحِيمُ", t:"ER-RAHÎM", m:"Ahirette sadece müminlere sonsuz ikram ve merhamet eden."},
        {a:"الْمَلِكُ", t:"EL-MELİK", m:"Bütün kâinatın tek sahibi ve mutlak hükümdarı."},
        {a:"الْقُدُّوسُ", t:"EL-KUDDÛS", m:"Her türlü eksiklik ve hatadan münezzeh, tertemiz olan."},
        {a:"السَّلَامُ", t:"ES-SELÂM", m:"Esenlik veren, tehlikelerden selamete çıkaran."},
        {a:"الْمُؤْمِنُ", t:"EL-MÜ'MİN", m:"Gönüllere iman veren, emniyet sağlayan, koruyan."},
        {a:"الْمُهَيْمِنُ", t:"EL-MÜHEYMİN", m:"Her şeyi görüp gözeten, kâinatın işlerini yöneten."},
        {a:"الْعَزِيزُ", t:"EL-AZÎZ", m:"İzzet sahibi, mağlup edilmesi mümkün olmayan güç."},
        {a:"الْجَبَّارُ", t:"EL-CEBBÂR", m:"Dilediğini zorla yaptıran, kırılanları onaran."}
        // ... (Veri yapısı stabil çalışması için ilk etapta 10 adet eklendi, mantık aynı)
    ];

    const SALAVAT = [
        {a:"اللهم صل على محمد", t:"SALAVAT-I ŞERİFE", m:"Allah'ım Efendimize rahmet eyle."},
        {a:"اللهم صل على سيدنا محمد الفاتح", t:"SALAVAT-I FATİH", m:"Kapalı kapıları açan Efendimize selam."},
        {a:"اللهم صل على محمد وعلى آل محمد", t:"SALLİ BARİK", m:"Efendimize ve ailesine rahmet olsun."}
    ];

    const AYETLER = ["Kalpler ancak Allah'ı anmakla huzur bulur.", "Beni anın ki Ben de sizi anayım.", "Şüphesiz Allah sabredenlerle beraberdir."];
    const HADISLER = ["Zikir kalbin cilasıdır.", "Ameller niyetlere göredir.", "Zikrin en hayırlısı gizli olanıdır."];

    // --- SİSTEM ---
    let audioCtx = null;
    let countVal = 0; 
    let activeCat = "Esma"; 
    let currentIdx = 0;
    let startTime = Date.now();
    let logs = JSON.parse(localStorage.getItem('zikirLogs') || '[]');

    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    
    function hit(e) {
        if(e) e.stopPropagation();
        countVal++;
        document.getElementById('count').innerText = countVal;
        if(navigator.vibrate) navigator.vibrate(15);
    }

    function updateUI() {
        let list = activeCat === "Esma" ? ESMA : (activeCat === "Salavat" ? SALAVAT : [{a:"لا إله إلا الله", t:"TEVHİD", m:"Allah'tan başka ilah yoktur"}]);
        let item = list[currentIdx % list.length];
        document.getElementById('ar').innerText = item.a;
        document.getElementById('tr').innerText = item.t;
        document.getElementById('mn').innerText = item.m;
        document.getElementById('activeLbl').innerText = item.t;
    }

    function save() {
        if(countVal === 0) return;
        const time = new Date().toLocaleTimeString().slice(0,5);
        const name = document.getElementById('activeLbl').innerText;
        logs.unshift({ n: name, v: countVal, t: time });
        localStorage.setItem('zikirLogs', JSON.stringify(logs));
        countVal = 0;
        document.getElementById('count').innerText = "0";
        render();
        toggle();
    }

    function render() {
        document.getElementById('logList').innerHTML = logs.map(l => `
            <div style="background:#1c1c1e; padding:18px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border-left:5px solid var(--neon);">
                <div><b style="font-size:1.1rem;">${l.n}</b><br><small style="color:#888;">Saat: ${l.t}</small></div>
                <div style="font-size:2rem; color:var(--neon); font-weight:900;">${l.v}</div>
            </div>
        `).join('');
    }

    function move(dir) {
        const list = activeCat === "Esma" ? ESMA : (activeCat === "Salavat" ? SALAVAT : [1]);
        currentIdx = (currentIdx + dir + list.length) % list.length;
        countVal = 0;
        updateUI();
    }

    function changeCategory(cat, el) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        activeCat = cat; currentIdx = 0; countVal = 0;
        updateUI();
    }

    function toggle() { 
        const p = document.getElementById('logPanel');
        p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
    }

    // SAAT VE AYET GÜNCELLEME
    function startClocks() {
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
            const diff = Math.floor((Date.now() - startTime) / 1000);
            const m = Math.floor(diff/60).toString().padStart(2,'0');
            const s = (diff%60).toString().padStart(2,'0');
            document.getElementById('sessionTimer').innerText = `${m}:${s}`;
        }, 1000);
    }

    window.onload = () => {
        const d = new Date().getDate();
        document.getElementById('ayetTxt').innerText = AYETLER[d % AYETLER.length];
        document.getElementById('hadisTxt').innerText = HADISLER[d % HADISLER.length];
        startClocks();
        render();
        updateUI();
    };

    let thm = 0;
    function nextTheme() {
        const themes = ['', 'theme-huzur', 'theme-gul'];
        thm = (thm + 1) % themes.length;
        document.body.className = themes[thm];
    }
</script>
</body>
</html>
